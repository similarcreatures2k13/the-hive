<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0B1F"/>
      <stop offset="50%" style="stop-color:#0F0F11"/>
      <stop offset="100%" style="stop-color:#0A0B1F"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFAA;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00FFAA;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00FFAA;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="redglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3B5C;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#FF3B5C;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF3B5C;stop-opacity:0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000" opacity="0.08"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#scanlines)"/>
  
  <!-- Horizontal accent lines -->
  <rect x="0" y="60" width="1200" height="1" fill="url(#glow)"/>
  <rect x="0" y="340" width="1200" height="1" fill="url(#glow)"/>
  
  <!-- Corner brackets -->
  <path d="M30 30 L30 70 M30 30 L70 30" stroke="#00FFAA" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M1170 30 L1170 70 M1170 30 L1130 30" stroke="#00FFAA" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M30 370 L30 330 M30 370 L70 370" stroke="#00FFAA" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M1170 370 L1170 330 M1170 370 L1130 370" stroke="#00FFAA" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Red accent line left -->
  <rect x="80" y="100" width="3" height="200" fill="#FF3B5C" opacity="0.4"/>
  
  <!-- Main title -->
  <text x="600" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-weight="900" font-size="72" fill="#00FFAA" filter="url(#neon)" letter-spacing="18">THE HIVE</text>
  
  <!-- Subtitle line -->
  <rect x="350" y="195" width="500" height="1" fill="url(#glow)"/>
  
  <!-- Subtitle -->
  <text x="600" y="230" text-anchor="middle" font-family="'Courier New', monospace" font-weight="400" font-size="16" fill="#E0E0E0" letter-spacing="6">MULTI-AGENT DEPLOYMENT SYSTEM</text>
  
  <!-- Version tag -->
  <rect x="520" y="248" width="160" height="24" rx="2" fill="none" stroke="#00FFAA" stroke-width="1" opacity="0.4"/>
  <text x="600" y="265" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#00FFAA" opacity="0.7">v1.0 // ACTIVE</text>
  
  <!-- Bottom status bar -->
  <rect x="100" y="310" width="1000" height="36" rx="2" fill="#1A1A1C" stroke="#2A2A2E" stroke-width="1"/>
  
  <!-- Status items -->
  <text x="130" y="333" font-family="'Courier New', monospace" font-size="12" fill="#888888">FRAMEWORKS</text>
  <text x="240" y="333" font-family="'Courier New', monospace" font-size="12" fill="#00FFAA">HERMES + OPENCLAW</text>
  
  <rect x="430" y="316" width="1" height="24" fill="#2A2A2E"/>
  
  <text x="450" y="333" font-family="'Courier New', monospace" font-size="12" fill="#888888">CHANNELS</text>
  <text x="540" y="333" font-family="'Courier New', monospace" font-size="12" fill="#00FFAA">WHATSAPP + TELEGRAM</text>
  
  <rect x="730" y="316" width="1" height="24" fill="#2A2A2E"/>
  
  <text x="750" y="333" font-family="'Courier New', monospace" font-size="12" fill="#888888">INTEL</text>
  <text x="800" y="333" font-family="'Courier New', monospace" font-size="12" fill="#00FFAA">CLAUDE SONNET 4</text>
  
  <rect x="950" y="316" width="1" height="24" fill="#2A2A2E"/>
  
  <text x="970" y="333" font-family="'Courier New', monospace" font-size="12" fill="#FF3B5C">● ONLINE</text>
  
  <!-- Small decorative hex pattern top right -->
  <text x="1100" y="90" font-family="'Courier New', monospace" font-size="10" fill="#1a1a2e" opacity="0.8">0x48 0x49 0x56 0x45</text>
  
  <!-- Small hex = "HIVE" in ASCII -->
  <text x="100" y="90" font-family="'Courier New', monospace" font-size="10" fill="#1a1a2e" opacity="0.8">// similarcreatures2k13</text>
</svg>
